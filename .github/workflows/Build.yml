name: Build Quran APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip git zip unzip \
            libffi-dev libssl-dev \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            cmake libltdl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Download Arabic font (Amiri)
        run: |
          mkdir -p fonts
          wget -q -O fonts/Amiri-Regular.ttf \
            "https://github.com/aliftype/amiri/raw/main/fonts/ttf/Amiri-Regular.ttf"
          echo "✅ Font downloaded:"
          ls -lh fonts/

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | sdkmanager --licenses 2>/dev/null || true
          yes | sdkmanager "build-tools;33.0.2" "platforms;android-33" 2>/dev/null || true

      - name: Build APK
        run: buildozer -v android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quran-apk
          path: bin/*.apk
          if-no-files-found: error

